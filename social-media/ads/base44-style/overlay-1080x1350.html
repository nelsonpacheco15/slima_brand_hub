<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { background:transparent; }
  :root{ --warmwhite:#fff7ec; }
  .ad{
    position:relative;
    width:1080px; height:1350px;
    overflow:hidden;
    font-family:'IBM Plex Serif', Georgia, serif;
    -webkit-font-smoothing:antialiased;
  }
  /* legibility scrim: dark at top behind text, transparent through the middle/lower so the sunset shows */
  .scrim{
    position:absolute; inset:0;
    background:
      linear-gradient(180deg, rgba(14,8,26,.62) 0%, rgba(14,8,26,.40) 26%, rgba(14,8,26,.10) 44%, rgba(14,8,26,0) 58%);
  }
  .footscrim{
    position:absolute; left:0; right:0; bottom:0; height:220px;
    background:linear-gradient(180deg, rgba(14,8,26,0) 0%, rgba(14,8,26,.55) 100%);
  }
  .wrap{
    position:absolute; left:0; right:0; top:0;
    display:flex; flex-direction:column; align-items:center;
    padding:120px 96px 0;
    text-align:center;
  }
  h1{
    color:var(--warmwhite);
    font-weight:400;
    font-size:66px;
    line-height:1.18;
    letter-spacing:-.012em;
    max-width:900px;
    text-wrap:balance;
    text-shadow:0 2px 30px rgba(12,6,22,.5);
  }
  h1 .em{ font-style:italic; }
  .act{
    margin-top:40px;
    color:#fffdf9;
    font-weight:400;
    font-size:66px;
    line-height:1.18;
    letter-spacing:-.012em;
    max-width:900px;
    text-wrap:balance;
    text-shadow:0 2px 30px rgba(12,6,22,.5);
  }
  .act .slima{ font-style:italic; }

  .foot{
    position:absolute; left:0; right:0; bottom:52px;
    display:flex; align-items:center; justify-content:center; gap:14px;
    color:var(--warmwhite);
  }
  .foot .name{ font-family:'IBM Plex Serif',serif; font-size:34px; }
  .foot .url{ font-family:'Inter','Helvetica Neue',Arial,sans-serif; font-size:22px; letter-spacing:.06em; opacity:.85; margin-left:8px; }
  .foot .dot{ opacity:.5; margin:0 3px; }
</style>
</head>
<body>
  <section class="ad">
    <div class="scrim"></div>
    <div class="footscrim"></div>

    <div class="wrap">
      <h1>Don&rsquo;t let your book stay stuck in your <span class="em">notes app</span>.</h1>
      <div class="act">Write it in <span class="slima">Slima</span> and finish it this time.</div>
    </div>

    <div class="foot">
      <svg width="32" height="32" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 1.5 L13.4 9.1 L19.8 4.8 L15.2 11 L22.5 12 L15.2 13 L19.8 19.2 L13.4 14.9 L12 22.5 L10.6 14.9 L4.2 19.2 L8.8 13 L1.5 12 L8.8 11 L4.2 4.8 L10.6 9.1 Z" fill="#fff7ec"/>
      </svg>
      <span class="name">Slima</span>
      <span class="dot">&middot;</span>
      <span class="url">slima.ai</span>
    </div>
  </section>
</body>
</html>
