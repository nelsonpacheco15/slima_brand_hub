<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { background:transparent; }
  :root{ --warmwhite:#fff7ec; }
  .ad{
    position:relative;
    width:1080px; height:1350px;
    overflow:hidden;
    font-family:'IBM Plex Serif', Georgia, serif;
    -webkit-font-smoothing:antialiased;
  }
  /* legibility scrim: dark at top behind text, transparent through the middle/lower so the sunset shows */
  .scrim{
    position:absolute; inset:0;
    background:
      linear-gradient(180deg, rgba(14,8,26,.62) 0%, rgba(14,8,26,.40) 26%, rgba(14,8,26,.10) 44%, rgba(14,8,26,0) 58%);
  }
  .footscrim{
    position:absolute; left:0; right:0; bottom:0; height:220px;
    background:linear-gradient(180deg, rgba(14,8,26,0) 0%, rgba(14,8,26,.55) 100%);
  }
  .wrap{
    position:absolute; left:0; right:0; top:0;
    display:flex; flex-direction:column; align-items:center;
    padding:120px 96px 0;
    text-align:center;
  }
  h1{
    color:var(--warmwhite);
    font-weight:400;
    font-size:66px;
    line-height:1.18;
    letter-spacing:-.012em;
    max-width:900px;
    text-wrap:balance;
    text-shadow:0 2px 30px rgba(12,6,22,.5);
  }
  h1 .em{ font-style:italic; }
  .act{
    margin-top:40px;
    color:#fffdf9;
    font-weight:400;
    font-size:66px;
    line-height:1.18;
    letter-spacing:-.012em;
    max-width:900px;
    text-wrap:balance;
    text-shadow:0 2px 30px rgba(12,6,22,.5);
  }
  .act .slima{ font-style:italic; }

  .foot{
    position:absolute; left:0; right:0; bottom:56px;
    display:flex; align-items:center; justify-content:center; gap:18px;
    color:var(--warmwhite);
  }
  .foot .logo{ height:46px; display:block; }
  .foot .url{ font-family:'Inter','Helvetica Neue',Arial,sans-serif; font-size:22px; letter-spacing:.06em; opacity:.85; }
  .foot .dot{ opacity:.5; }
</style>
</head>
<body>
  <section class="ad">
    <div class="scrim"></div>
    <div class="footscrim"></div>

    <div class="wrap">
      <h1>Don&rsquo;t let your book stay stuck in your <span class="em">notes app</span>.</h1>
      <div class="act">Write it in <span class="slima">Slima</span> and finish it this time.</div>
    </div>

    <div class="foot">
      <img class="logo" src="slima-logo-white.svg" alt="Slima">
      <span class="dot">&middot;</span>
      <span class="url">slima.ai</span>
    </div>
  </section>
</body>
</html>
